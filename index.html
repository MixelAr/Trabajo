<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        <script defer src="js/script.js"></script>


</head>

<body class="container mt-5">
    <h1>Listado de Tareas</h1>
    <div class="row g-3 mt-3">
        <div class="col-auto">
            <label for="staticEmail2" class="visually-hidden">Email</label>
            <input type="text" readonly class="form-control-plaintext" id="staticEmail2" value="Tarea a registrar">
        </div>
        <div class="col-auto">
            <label for="inputPassword2" class="visually-hidden">Password</label>
            <input type="text" class="form-control" id="Tarea" placeholder="Nombre Tarea">
        </div>
        <div class="col-auto">
            <button type=button" id="btnAgregar" class="btn btn-primary mb-3">Agregar tarea <i
                    class="bi bi-file-earmark-text-fill"></i></button>
        </div>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lista Pendientes</title>
        <div class="col-auto">
            <button type=button" id="btnEditar" class="btn btn-primary mb-3">Editar tarea <i
                    class="bi bi-file-earmark-text-fill"></i></button>
        </div>
        <div class="col-auto">
            <button type="button" id="btnEliminar" class="btn btn-danger mb-3">Eliminar tarea <i
                    class="bi bi-file-earmark-text-fill"></i></button>
        </div>
        <div class="col-auto">
            <button type="button" id="btnBuscar" class="btn btn-secondary mb-3">Buscar tarea <i
                    class="bi bi-file-earmark-text-fill"></i></button>
        </div>

    </div>

</body>

</html>
